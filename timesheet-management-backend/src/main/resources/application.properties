# PostgreSQL Properties
spring.datasource.url=jdbc:postgresql://localhost:5432/timesheet_service_management
spring.datasource.username=enter_your_DB_name
spring.datasource.password=enter_your_password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.datasource.driver-class-name=org.postgresql.Driver


#spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

springdoc.packagesToScan=com.timesheetmanagement.controller
springdoc.pathsToMatch=/api/**
jwt.token.expiration-in-ms=86400000

com.timesheetmanagement.image.profile.folder.path=/Users/jagadeeswarreddy/Documents/workspace-spring-tool-suite-4-4.27.0.RELEASE/Timesheet Management System/image

